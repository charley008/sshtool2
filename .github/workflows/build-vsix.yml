name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build extension package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npm run package

      - name: Locate VSIX
        id: vsix
        shell: bash
        run: |
          file="$(ls -1 *.vsix | head -n 1)"
          echo "file=$file" >> "$GITHUB_OUTPUT"
          echo "Built $file"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshtools-vsix
          path: ${{ steps.vsix.outputs.file }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          VSIX_FILE: ${{ steps.vsix.outputs.file }}
        shell: bash
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$VSIX_FILE" --clobber
          else
            gh release create "$TAG_NAME" "$VSIX_FILE" --title "$TAG_NAME" --generate-notes
          fi
